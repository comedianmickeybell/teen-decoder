<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Teen Decoder™</title>
<meta name="description" content="A free 2-minute quiz for parents. Discover your teen's communication type — and the exact words that get them talking again.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F4EDE0;
  --cream-deep:#EBDFC8;
  --paper:#FBF7EF;
  --ink:#1F1A14;
  --ink-soft:#534A3F;
  --ink-mute:#8A7E6E;
  --clay:#C2553A;
  --clay-deep:#A0432D;
  --clay-soft:#F2D5C8;
  --sage:#6F7C5E;
  --sage-soft:#DDE4D4;
  --line:#D9CDB4;
  --line-soft:#E8E0CE;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--cream);
  color:var(--ink);
  font-family:'Manrope',system-ui,sans-serif;
  display:flex;justify-content:center;
  padding:2rem 1rem;
  min-height:100vh;
  position:relative;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.3;
  background-image:url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 .12 0 0 0 0 .10 0 0 0 0 .08 0 0 0 .18 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}
.display{font-family:'Fraunces',Georgia,serif;font-variation-settings:"SOFT" 50,"opsz" 144;font-weight:400;letter-spacing:-.01em;line-height:1.05}
.display em{font-style:italic;font-variation-settings:"SOFT" 100,"opsz" 144}

/* ============ SHELL ============ */
.shell{
  background:var(--paper);
  max-width:680px;width:100%;
  border-radius:14px;
  border:1px solid var(--line);
  overflow:hidden;
  position:relative;z-index:1;
  box-shadow:0 24px 60px -30px rgba(31,26,20,.18);
}

/* ============ HEADER ============ */
.hdr{
  background:var(--cream-deep);
  padding:1.6rem 1.75rem 1.4rem;
  border-bottom:1px solid var(--line);
}
.hdr-eyebrow{
  font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--clay-deep);font-weight:700;
  display:inline-flex;align-items:center;gap:10px;
  margin-bottom:.85rem;
}
.hdr-eyebrow::before{content:"";width:24px;height:1px;background:var(--clay)}
.hdr-title{
  font-family:'Fraunces',serif;
  font-variation-settings:"SOFT" 50,"opsz" 144;
  font-size:42px;font-weight:400;
  color:var(--ink);
  line-height:.95;letter-spacing:-.02em;
  margin-bottom:.65rem;
}
.hdr-title em{font-style:italic;font-variation-settings:"SOFT" 100,"opsz" 144;color:var(--clay-deep)}
.hdr-trade{font-size:14px;vertical-align:super;color:var(--ink-mute);font-style:normal}
.hdr-badge{
  display:inline-block;
  background:transparent;
  color:var(--ink-soft);
  font-size:10px;font-weight:600;
  padding:4px 0;letter-spacing:.18em;text-transform:uppercase;
  border-top:1px solid var(--line);
  padding-top:.85rem;margin-top:.5rem;
}

/* ============ BODY ============ */
.body{padding:1.75rem}

/* ============ INTRO ============ */
.intro-quote{
  background:var(--cream);
  border-left:3px solid var(--clay);
  padding:1.4rem 1.5rem;
  margin-bottom:1.5rem;
  border-radius:4px;
}
.iq-text{
  font-family:'Fraunces',serif;
  font-style:italic;
  font-size:17px;
  line-height:1.55;
  color:var(--ink);
  margin-bottom:.75rem;
}
.iq-text strong{font-style:normal;font-weight:600;color:var(--clay-deep);background:var(--clay-soft);padding:1px 6px;border-radius:3px}
.iq-attr{
  font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--ink-mute);font-weight:600;
  display:flex;align-items:center;gap:8px;
}
.iq-attr::before{content:"";width:18px;height:1px;background:var(--ink-mute)}

.intro-explain{
  margin-bottom:1.25rem;
}
.intro-explain-h{
  font-family:'Fraunces',serif;
  font-size:24px;font-weight:500;
  color:var(--ink);
  line-height:1.2;letter-spacing:-.01em;
  margin-bottom:1rem;
}
.intro-explain-p{
  font-size:15px;color:var(--ink-soft);
  line-height:1.7;margin-bottom:1rem;
}
.intro-explain-p:last-child{margin-bottom:0}
.intro-explain-p strong{color:var(--ink);font-weight:600}

.phase-row{
  display:flex;gap:8px;margin:1.5rem 0;
  border:1px solid var(--line);
  border-radius:10px;
  padding:4px;
  background:var(--cream);
}
.phase-step{
  flex:1;border-radius:7px;padding:.85rem .65rem;text-align:center;
  background:transparent;
}
.phase-step.active{background:var(--paper);box-shadow:0 1px 2px rgba(31,26,20,.06)}
.phase-num{
  font-family:'Fraunces',serif;font-style:italic;
  font-size:22px;font-weight:500;
  color:var(--clay);line-height:1;
  margin-bottom:.35rem;
}
.phase-step:not(.active) .phase-num{color:var(--ink-mute)}
.phase-label{font-size:12px;font-weight:600;color:var(--ink);line-height:1.3}
.phase-step:not(.active) .phase-label{color:var(--ink-mute)}
.phase-sub{font-size:10.5px;color:var(--ink-mute);margin-top:3px;line-height:1.3;font-style:italic}

.intro-callout{
  background:var(--sage-soft);
  border-left:3px solid var(--sage);
  border-radius:4px;
  padding:.95rem 1.15rem;
  font-size:13.5px;color:var(--ink-soft);line-height:1.6;
  margin-top:1.25rem;
}

.intro-start-card{
  background:var(--cream);
  border:1px solid var(--line);
  border-radius:12px;
  padding:1.6rem 1.5rem;
  margin:1.5rem 0 1.25rem;
  text-align:center;
}
.intro-start-h{
  font-family:'Fraunces',serif;
  font-size:22px;font-weight:500;
  color:var(--ink);
  margin-bottom:.5rem;line-height:1.25;letter-spacing:-.01em;
}
.intro-start-h em{font-style:italic;color:var(--clay-deep)}
.intro-start-p{font-size:14px;color:var(--ink-soft);line-height:1.55;margin-bottom:1.2rem;max-width:42ch;margin-left:auto;margin-right:auto}

.type-pills{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:1.5rem}
.tpill{
  font-size:11.5px;font-weight:600;
  padding:5px 13px;border-radius:20px;
  letter-spacing:.01em;
  border:1px solid;
}

.btn-start{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--ink);color:var(--cream);
  border:none;
  border-radius:999px;
  padding:15px 32px;
  font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  font-family:'Manrope',sans-serif;cursor:pointer;
  transition:all .2s ease;
  box-shadow:0 8px 22px -10px rgba(31,26,20,.45);
}
.btn-start:hover{background:var(--clay-deep);transform:translateY(-2px)}

.how-row{display:flex;gap:8px;margin:1.5rem 0 1.25rem}
.how-step{
  flex:1;
  background:var(--cream);
  border:1px solid var(--line);
  border-radius:10px;
  padding:.95rem .75rem;
  text-align:center;
}
.how-num{
  font-family:'Fraunces',serif;font-style:italic;
  font-size:30px;font-weight:500;
  color:var(--clay);line-height:1;margin-bottom:.3rem;
}
.how-label{font-size:11.5px;color:var(--ink-soft);line-height:1.4}

.intro-fine{font-size:11px;color:var(--ink-mute);text-align:center;line-height:1.6;font-style:italic}

/* ============ PROGRESS ============ */
.prog-row{display:flex;align-items:center;gap:14px;margin-bottom:1.5rem}
.prog-wrap{flex:1;background:var(--line-soft);border-radius:20px;height:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:20px;background:var(--clay);transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-label{font-size:11px;color:var(--ink-mute);font-weight:600;letter-spacing:.08em;white-space:nowrap}

/* ============ QUESTION CARD ============ */
.qcard{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:12px;
  padding:1.75rem;
  margin-bottom:1rem;
}
.qnum{
  font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--clay-deep);font-weight:700;margin-bottom:.85rem;
}
.qtext{
  font-family:'Fraunces',serif;
  font-size:21px;font-weight:500;
  color:var(--ink);
  line-height:1.3;letter-spacing:-.01em;
  margin-bottom:1.4rem;
}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{
  display:flex;align-items:flex-start;gap:13px;
  padding:14px 16px;
  border-radius:10px;
  border:1px solid var(--line);
  background:var(--cream);
  cursor:pointer;
  font-size:14px;color:var(--ink);
  text-align:left;
  font-family:'Manrope',sans-serif;
  width:100%;line-height:1.5;
  transition:all .18s ease;
}
.opt:hover{border-color:var(--clay);background:var(--clay-soft)}
.opt.sel{border-color:var(--clay);background:var(--clay-soft)}
.dot{
  width:16px;height:16px;border-radius:50%;
  border:1.5px solid var(--ink-mute);
  flex-shrink:0;margin-top:2px;
  background:var(--paper);
  position:relative;
  transition:all .2s ease;
}
.opt.sel .dot{background:var(--clay);border-color:var(--clay)}
.opt.sel .dot::after{
  content:"";position:absolute;top:3px;left:3px;
  width:7px;height:7px;border-radius:50%;
  background:var(--paper);
}

.nav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:1.25rem}
.btn-next{
  background:var(--ink);color:var(--cream);
  border:none;border-radius:999px;
  padding:13px 28px;
  font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  font-family:'Manrope',sans-serif;cursor:pointer;
  transition:all .2s ease;
  min-width:160px;
  box-shadow:0 6px 18px -8px rgba(31,26,20,.4);
}
.btn-next:hover{background:var(--clay-deep);transform:translateY(-1px)}
.btn-next:disabled{background:var(--ink-mute);cursor:not-allowed;transform:none;box-shadow:none;opacity:.6}
.btn-back{
  background:transparent;
  border:1px solid var(--line);
  border-radius:999px;
  padding:12px 18px;
  font-size:12px;font-weight:600;letter-spacing:.04em;
  color:var(--ink-soft);cursor:pointer;
  font-family:'Manrope',sans-serif;
  transition:all .2s ease;
}
.btn-back:hover{border-color:var(--ink);color:var(--ink)}

/* ============ RESULTS ============ */
.results-eyebrow{
  font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--clay-deep);font-weight:700;margin-bottom:.5rem;
}
.results-title{
  font-family:'Fraunces',serif;
  font-size:30px;font-weight:500;
  color:var(--ink);line-height:1.1;letter-spacing:-.015em;
  margin-bottom:.5rem;
}
.results-title em{font-style:italic;color:var(--clay-deep)}
.results-sub{font-size:14px;color:var(--ink-soft);line-height:1.55;margin-bottom:1.25rem;max-width:48ch}

.warn-box{
  background:#FBF0DC;
  border-left:3px solid #C8913A;
  border-radius:4px;
  padding:.95rem 1.2rem;
  font-size:13px;color:#7a5020;line-height:1.6;
  margin-bottom:1.25rem;
}
.warn-box strong{color:#5a3500;font-weight:700}

.primary-hero{
  border-radius:14px;
  padding:1.75rem;
  margin-bottom:1.25rem;
  position:relative;overflow:hidden;
  border:1px solid;
}
.ph-eyebrow{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;margin-bottom:.55rem}
.ph-name{
  font-family:'Fraunces',serif;
  font-size:32px;font-weight:500;
  line-height:1.05;letter-spacing:-.015em;
  margin-bottom:.55rem;
}
.ph-hook{
  font-family:'Fraunces',serif;
  font-style:italic;
  font-size:15px;
  margin-bottom:1.1rem;
  line-height:1.5;
  opacity:.85;
}
.ph-body{font-size:14px;line-height:1.7;opacity:.92}

.need-pill-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.5rem}
.need-pill{
  background:var(--ink);color:var(--cream);
  font-size:11.5px;font-weight:500;
  padding:6px 14px;border-radius:20px;
  letter-spacing:.01em;
}

.section-eyebrow{
  font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--clay-deep);font-weight:700;
  margin:1.5rem 0 .8rem;
  display:flex;align-items:center;gap:10px;
}
.section-eyebrow::before{content:"";width:24px;height:1px;background:var(--clay)}

.score-card{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:10px;
  padding:1rem 1.2rem;
  margin-bottom:.6rem;
}
.score-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.score-name{font-size:13.5px;font-weight:600;color:var(--ink)}
.score-pct{font-family:'Fraunces',serif;font-size:18px;font-weight:600;letter-spacing:-.01em}
.score-track{background:var(--line-soft);border-radius:20px;height:5px;overflow:hidden}
.score-fill{height:100%;border-radius:20px;transition:width .8s ease}

.icard{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:12px;
  padding:1.25rem 1.4rem;
  margin-bottom:.85rem;
}
.icard-text{font-size:14px;color:var(--ink);line-height:1.7}
.list-item{
  padding:9px 0;
  border-bottom:1px dashed var(--line);
  font-size:14px;color:var(--ink);line-height:1.5;
  font-family:'Fraunces',serif;font-style:italic;
}
.list-item:last-child{border-bottom:none}

/* ============ "FULL REPORT INCLUDES" BOX ============ */
.beginning-box{
  background:var(--cream);
  border:1px solid var(--line);
  border-radius:14px;
  margin:1.5rem 0 1.25rem;
  overflow:hidden;
}
.beginning-header{
  padding:1.4rem 1.6rem 1.1rem;
  border-bottom:1px solid var(--line);
}
.beginning-eyebrow{
  font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--clay-deep);font-weight:700;margin-bottom:.6rem;
}
.beginning-title{
  font-family:'Fraunces',serif;
  font-size:21px;font-weight:500;
  color:var(--ink);line-height:1.25;letter-spacing:-.01em;
}
.beginning-title em{font-style:italic;color:var(--clay-deep)}
.beginning-body{padding:1.25rem 1.6rem}
.wi-row{
  display:flex;align-items:flex-start;gap:11px;
  font-size:14px;color:var(--ink);line-height:1.55;
  margin-bottom:9px;
}
.wi-row:last-child{margin-bottom:0}
.wi-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--clay);
  flex-shrink:0;margin-top:8px;
}

/* ============ NEXT STEP CTA (NEW — direct to SamCart) ============ */
.next-step{
  background:var(--ink);
  color:var(--cream);
  border-radius:14px;
  padding:1.85rem 1.75rem;
  margin:1.5rem 0 1.25rem;
  position:relative;overflow:hidden;
  border-top:3px solid var(--clay);
}
.next-step::after{
  content:"";position:absolute;top:-80px;right:-80px;
  width:240px;height:240px;border-radius:50%;
  background:radial-gradient(circle,var(--clay) 0%,transparent 70%);
  opacity:.18;pointer-events:none;
}
.next-step-eyebrow{
  font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;
  font-weight:700;color:var(--clay-soft);
  margin-bottom:.85rem;
  display:inline-flex;align-items:center;gap:10px;
  position:relative;z-index:2;
}
.next-step-eyebrow::before{content:"";width:24px;height:1px;background:var(--clay-soft)}
.next-step-h{
  font-family:'Fraunces',serif;
  font-size:26px;font-weight:500;
  line-height:1.15;letter-spacing:-.015em;
  color:var(--cream);margin-bottom:.85rem;
  position:relative;z-index:2;
}
.next-step-h em{font-style:italic;color:var(--clay-soft)}
.next-step-lede{
  font-size:14px;line-height:1.7;
  color:rgba(244,237,224,.8);
  margin-bottom:1.25rem;
  position:relative;z-index:2;
}
.next-step-pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.4rem;position:relative;z-index:2}
.next-step-pill{
  background:rgba(244,237,224,.06);
  border:1px solid rgba(244,237,224,.18);
  padding:6px 13px;border-radius:20px;
  font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  color:rgba(244,237,224,.85);
  display:inline-flex;align-items:center;gap:7px;
}
.next-step-pill strong{
  font-family:'Fraunces',serif;font-style:italic;
  font-size:14px;font-weight:600;color:var(--clay-soft);
  letter-spacing:0;text-transform:none;
}
.next-step-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:var(--clay);color:var(--cream);
  border-radius:999px;
  padding:16px 28px;
  font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  text-decoration:none;
  position:relative;z-index:2;
  transition:all .2s ease;
  box-shadow:0 10px 26px -10px rgba(194,85,58,.6);
}
.next-step-btn:hover{background:var(--clay-deep);transform:translateY(-2px)}
.next-step-btn .arrow{transition:transform .2s ease}
.next-step-btn:hover .arrow{transform:translateX(4px)}
.next-step-sub{
  font-size:12px;color:rgba(244,237,224,.6);
  text-align:center;margin-top:.85rem;font-style:italic;
  position:relative;z-index:2;
}

.or-divider{
  display:flex;align-items:center;gap:14px;
  margin:1.5rem 0;
}
.or-divider::before,.or-divider::after{
  content:"";flex:1;height:1px;background:var(--line);
}
.or-divider span{
  font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--ink-mute);font-weight:600;
}

/* ============ EMAIL CAPTURE (secondary path) ============ */
.capture-card{
  background:var(--cream);
  border:1px solid var(--line);
  border-radius:14px;
  padding:1.6rem 1.6rem;
  margin-bottom:1rem;
}
.cap-eyebrow{
  font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--ink-mute);font-weight:700;margin-bottom:.5rem;
}
.cap-title{
  font-family:'Fraunces',serif;
  font-size:20px;font-weight:500;
  color:var(--ink);line-height:1.25;letter-spacing:-.01em;
  margin-bottom:.4rem;
}
.cap-title em{font-style:italic;color:var(--clay-deep)}
.cap-sub{font-size:13px;color:var(--ink-soft);line-height:1.6;margin-bottom:1.1rem}
.field-wrap{margin-bottom:10px}
.field-label{
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-soft);font-weight:700;
  margin-bottom:6px;display:block;
}
.field-wrap input{
  width:100%;padding:12px 14px;
  border:1px solid var(--line);
  border-radius:8px;
  font-size:14px;color:var(--ink);
  background:var(--paper);
  font-family:'Manrope',sans-serif;
  transition:all .2s ease;
}
.field-wrap input:focus{outline:none;border-color:var(--clay);background:#fff}
.btn-submit{
  display:block;width:100%;
  background:var(--ink);color:var(--cream);
  border:none;border-radius:999px;
  padding:14px;
  font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  font-family:'Manrope',sans-serif;cursor:pointer;
  transition:all .2s ease;
  margin-top:6px;
}
.btn-submit:hover{background:var(--clay-deep)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed}
.privacy-note{font-size:11px;color:var(--ink-mute);text-align:center;margin-top:.85rem;line-height:1.55;font-style:italic}
.err{font-size:12px;color:#9B2020;margin-top:6px}

/* ============ RESTART / FOOTER ============ */
.restart-btn{
  display:block;width:100%;text-align:center;
  padding:12px;border:none;background:transparent;
  font-size:13px;color:var(--ink-mute);
  font-family:'Manrope',sans-serif;cursor:pointer;
  transition:color .2s ease;
}
.restart-btn:hover{color:var(--clay-deep)}
.footer-note{

    scoreCards+

      '<div class="beginning-header">'+

    '<div class="next-step">'+
      '<div class="next-step-eyebrow">Now That You Know · Here\'s the Next Step</div>'+

}

/* ====================================================
   EMAIL SUBMIT (unchanged logic)
   ==================================================== */
function submitCapture(){
  var name=document.getElementById('fname').value.trim();
  var email=document.getElementById('femail').value.trim();
  var btn=document.querySelector('.btn-submit');
  var err=document.getElementById('ferr');
  if(!name){err.textContent='Please enter your first name.';return}
  if(!email||!email.includes('@')){err.textContent='Please enter a valid email address.';return}
  err.textContent='';
  btn.textContent='Sending…';
  btn.disabled=true;
  var TYPE_TAGS={shut:1991538,react:1991539,avoid:1991540,perf:1991541};
  var tagId=pkey&&TYPE_TAGS[pkey]?TYPE_TAGS[pkey]:null;
  fetch(WORKER_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({firstName:name,email:email,tagId:tagId})
  }).then(function(r){return r.json();}).then(function(d){
    console.log('Worker response:',JSON.stringify(d));
    showConfirmation(name,email);
  }).catch(function(e){
    console.log('Worker error:',e);
    showConfirmation(name,email);
  });
}
