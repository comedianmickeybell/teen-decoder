/* FIX 4 — redesigned beginning block */
.beginning-box{border-radius:14px;margin-bottom:1.25rem;overflow:hidden;border:1.5px solid #1B3A5C}

.cap-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:#0D1B2A;margin-bottom:.4rem;line-height:1.3;position:relative;z-index:2}

.wi-row{display:flex;align-items:flex-start;gap:9px;font-size:13px;color:#0D1B2A;line-height:1.5;margin-bottom:8px;position:relative;z-index:2}
.wi-dot{width:5px;height:5px;border-radius:50%;background:#5EC4C4;flex-shrink:0;margin-top:6px}
.field-label{font-size:10px;letter-spacing:.1em;color:#24507A;margin-bottom:5px;display:block;font-weight:500;position:relative;z-index:2}
.field-wrap{margin-bottom:11px;position:relative;z-index:2}
.field-wrap input{width:100%;padding:11px 14px;border:1.5px solid #E8E0CE;border-radius:10px;font-size:14px;color:#0D1B2A;background:#FBF8F2;font-family:'DM Sans',sans-serif;transition:border-color .2s}
.field-wrap input:focus{outline:none;border-color:#5EC4C4;background:#ffffff}
.btn-submit{display:block;width:100%;background-color:#1D6FE8;color:#ffffff;border:none;border-radius:10px;padding:15px;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;margin-top:4px;position:relative;z-index:2;text-align:center}
.btn-submit:hover{background-color:#1558C0;transform:translateY(-1px)}
/* FIX 3 — removed email series line, just privacy note */
.privacy-note{font-size:11px;color:#24507A;text-align:center;margin-top:.75rem;line-height:1.55;opacity:.7;position:relative;z-index:2}

@keyframes spin{to{transform:rotate(360deg)}}

<body>
<div class="shell" id="app">
  <div class="hdr">
    <div class="hdr-decor"></div><div class="hdr-decor2"></div>
    <div class="hdr-inner">
      <div class="hdr-eyebrow">THE 10-MINUTE CONVERSATION METHOD</div>
      <div class="hdr-title">The Teen<br><em>Decoder</em></div>
      <div class="hdr-badge">FREE INTELLIGENCE REPORT</div>
    </div>
  </div>
  <div class="body" id="screen"></div>
</div>
<script>
const Q=[
  {text:"When something is clearly bothering your teen, what do they usually do?",opts:[
    {l:"Go completely quiet — retreat, avoid eye contact, nod instead of engaging",t:{shut:3,avoid:1}},
    {l:"Snap, raise their voice, get defensive or storm off — then cool down later",t:{react:3,shut:1}},
    {l:"Change the subject, grab their phone, laugh it off, find a reason to leave",t:{avoid:3,perf:1}},
    {l:"Act confident and positive — say they're fine, even when they clearly aren't",t:{perf:3,avoid:1}}
  ]},
  {text:"When you try to start a real conversation, which sounds most like your teen?",opts:[
    {l:"'I don't know.' / 'Nothing.' / 'I'm fine.' — minimal, flat, closed off",t:{shut:3,avoid:1}},
    {l:"'You don't get it!' / 'Why are you always on me?!' — escalates fast",t:{react:3,perf:1}},
    {l:"'I'm good.' / 'Can we not do this right now?' — deflects and exits",t:{avoid:3,shut:1}},
    {l:"'I got it.' / 'It's not that serious.' — breezy, keeps it light, moves on",t:{perf:3,react:1}}
  ]},
  {text:"What is your teen probably feeling inside — but would never say out loud?",opts:[
    {l:"'This feels too big to put into words. I might mess it up if I try.'",t:{shut:3,avoid:1}},
    {l:"'I feel attacked and misunderstood. Everything feels bigger than it should.'",t:{react:3,shut:1}},
    {l:"'This is awkward. I don't even know what I feel. Let's keep this light.'",t:{avoid:3,perf:1}},
    {l:"'I don't want to burden anyone. People expect me to be okay.'",t:{perf:3,avoid:1}}
  ]},
  {text:"Which belief is your teen most likely carrying — even if they'd never admit it?",opts:[
    {l:"'It's better to say nothing than say something stupid or wrong.'",t:{shut:3,perf:1}},
    {l:"'Nobody listens to me unless I get loud. I'm always the problem.'",t:{react:3,shut:1}},
    {l:"'If I ignore it, it'll go away. Talking about it makes it worse.'",t:{avoid:3,react:1}},
    {l:"'I have to keep it together. My value is in how I perform.'",t:{perf:3,avoid:1}}
  ]},
  {text:"When your teen is under pressure — school, relationships, life — what does it look like?",opts:[
    {l:"They go silent and withdraw. You have to guess what's happening inside.",t:{shut:3,avoid:1}},
    {l:"The pressure leaks sideways — they explode over something small.",t:{react:3,shut:1}},
    {l:"They stay distracted and surface-level. Busy, but not really present.",t:{avoid:3,perf:1}},
    {l:"They push harder and act fine — but you can sense the tension underneath.",t:{perf:3,avoid:1}}
  ]},
  {text:"Which of these concerns you most about your teen right now?",opts:[
    {l:"That they're drowning in silence and I can't reach them",t:{shut:3,avoid:1}},
    {l:"That the anger and intensity is going to damage our relationship",t:{react:3,shut:1},w:true},
    {l:"That they're avoiding everything and drifting further away",t:{avoid:3,react:1},w:true},
    {l:"That they're holding it together on the outside — but quietly falling apart inside",t:{perf:3,avoid:1},w:true}
  ]}
];
const TYPES={
  shut:{name:"The Shut Downer",color:"#1B3A5C",bg:"#E8F5F5",border:"#5EC4C4",scoreColor:"#24507A",gradA:"#5EC4C4",gradB:"#4A90B8"},
  react:{name:"The Reactor",color:"#7A2800",bg:"#FDF0EC",border:"#FFBBAA",scoreColor:"#C84B1E",gradA:"#C84B1E",gradB:"#8B2500"},
  avoid:{name:"The Avoider",color:"#2C3E6B",bg:"#EDEDFC",border:"#AAAAEE",scoreColor:"#5B5BBF",gradA:"#5B5BBF",gradB:"#3A3A9A"},
  perf:{name:"The Performer",color:"#6B4400",bg:"#FBF0DC",border:"#E8C47A",scoreColor:"#C8913A",gradA:"#C8913A",gradB:"#A06820"}
};
const INS={
  shut:{hook:'"If I don\'t say anything… I can\'t say the wrong thing."',tagline:"Silence is their protection — not their answer.",needs:["Low-pressure conversations","Time to process","Safety over intensity"],whoTheyAre:"This teen isn\'t trying to be difficult — they\'re overwhelmed. When emotions rise, their brain hits the brakes. Silence feels safer than saying something they might regret, get judged for, or not know how to explain.",reality:"Their brain is overloaded. Emotion plus pressure equals shutdown. It\'s not rebellion — it\'s protection. Silence is their coping mechanism, not a wall they\'re building against you.",feelings:["'I don\'t know how to explain what\'s going on inside me.'","'If I open up, I might mess it up.'","'This feels too big to put into words.'","'I just need space to figure it out.'"],lies:["'What I feel doesn\'t make sense.'","'If I say it wrong, I\'ll disappoint them.'","'It\'s better to say nothing than say it wrong.'","'No one will really understand anyway.'"],sayYes:["'You don\'t have to talk right now — I\'m here when you\'re ready.'","'I\'ve noticed you seem off. Just wanted you to know I care.'","'We don\'t have to figure it all out tonight.'","'I\'m not here to fix it — I just want to understand you.'"],sayNo:["'Why won\'t you talk to me?'","'You need to tell me what\'s going on right now.'","'This is ridiculous.'","'If you don\'t talk, I can\'t help you.'"],sayTip:"Pressure makes them shut down faster. Safety opens them up.",nextStep:"Now that you know your teen shuts down, step two is Mickey Bell\'s Observe → Validate → Invite method — a 3-step approach built specifically for teens who won\'t talk. That\'s exactly what Tool #2 teaches.",stat:{n:"1 in 3",l:"teens say they stay silent because they fear disappointing the people they love most"}},
  react:{hook:'"If I feel it… you\'re going to hear it."',tagline:"The anger is the symptom. The hurt underneath it is the real story.",needs:["Calm from you first","Validation before correction","Space to regulate"],whoTheyAre:"This teen feels everything deeply — and fast. Their emotions hit like a wave before they have time to process them. What looks like attitude is often unmanaged intensity — not disrespect.",reality:"They don\'t lack emotion — they lack regulation. Their reaction is faster than their ability to process. It\'s not defiance — it\'s overflow. And they need someone to stay calm when they can\'t.",feelings:["'I feel attacked right now.'","'I don\'t know how to calm this down.'","'I feel completely misunderstood.'","'Everything feels bigger than it should.'"],lies:["'I\'m always in trouble.'","'Nobody listens to me unless I get loud.'","'I\'m the problem.'","'They\'re against me.'"],sayYes:["'I can see you\'re frustrated — let\'s slow this down.'","'I\'m not against you. I\'m trying to understand you.'","'Let\'s take a minute and come back to this.'","'Your feelings matter. Let\'s figure this out together.'"],sayNo:["'Calm down!'","'You\'re overreacting.'","'Watch your attitude.'","'You\'re being disrespectful.' (mid-explosion)"],sayTip:"Match their intensity = escalation. Lower your tone = lowers the temperature.",nextStep:"Reactive teens need a very specific sequence — de-escalate first, connect second. Tool #2 walks you through Mickey Bell\'s exact method for reaching your teen before and after the next explosion.",stat:{n:"76%",l:"of teens who display anger say they wished someone had asked what was really wrong instead of reacting to the outburst"}},
